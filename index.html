<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Normal Distribution</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      height: calc(100vh - 80px);
      box-sizing: border-box;
    }

    .controls {
      flex: 1;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .chart-box {
      flex: 2;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    label {
      display: block;
      margin-top: 20px;
    }

    input[type="range"] {
      width: 100%;
    }

    .value {
      font-weight: bold;
      color: #38bdf8;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
      }

      .chart-box {
        height: 300px;
      }
    }
  </style>
</head>
<body>

<h2>Normal Distribution Interactive</h2>

<div class="container">
  
  <div class="controls">
    <label>
      Mean (μ): <span class="value" id="muVal">0</span>
      <input type="range" id="mu" min="-5" max="5" step="0.1" value="0">
    </label>

    <label>
      Std Dev (σ): <span class="value" id="sigmaVal">1</span>
      <input type="range" id="sigma" min="0.1" max="5" step="0.1" value="1">
    </label>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
const ctx = document.getElementById('chart').getContext('2d');

function normal(x, mu, sigma) {
  return (1 / (sigma * Math.sqrt(2 * Math.PI))) *
         Math.exp(-Math.pow(x - mu, 2) / (2 * sigma * sigma));
}

function generateData(mu, sigma) {
  let data = [];
  for (let x = -10; x <= 10; x += 0.1) {
    data.push({x: x, y: normal(x, mu, sigma)});
  }
  return data;
}

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [{
      label: 'Normal Distribution',
      data: generateData(0, 1),
      parsing: false,
      borderWidth: 2,
      borderColor: '#38bdf8',
      tension: 0.4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          color: '#e2e8f0'
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        ticks: { color: '#e2e8f0' },
        grid: { color: '#334155' }
      },
      y: {
        ticks: { color: '#e2e8f0' },
        grid: { color: '#334155' }
      }
    }
  }
});

function updateChart() {
  let mu = parseFloat(document.getElementById('mu').value);
  let sigma = parseFloat(document.getElementById('sigma').value);

  document.getElementById('muVal').innerText = mu;
  document.getElementById('sigmaVal').innerText = sigma;

  chart.data.datasets[0].data = generateData(mu, sigma);
  chart.update();
}

document.getElementById('mu').addEventListener('input', updateChart);
document.getElementById('sigma').addEventListener('input', updateChart);
</script>

</body>
</html>
